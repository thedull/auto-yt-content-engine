<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="-apple-system, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e8e8e8"/>
    </marker>
  </defs>
  <rect width="900" height="460" fill="#0b1220"/>
  <text x="450" y="36" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="700">Where agents run in production</text>

  <!-- Local -->
  <rect x="40" y="80" width="240" height="320" rx="10" fill="#1e2a3a" stroke="#4aa3ff"/>
  <text x="160" y="110" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="700">Local / dev</text>
  <text x="160" y="150" text-anchor="middle" fill="#c0c8d0" font-size="13">stdio MCP servers</text>
  <text x="160" y="175" text-anchor="middle" fill="#c0c8d0" font-size="13">CLI agents (Claude Code,</text>
  <text x="160" y="193" text-anchor="middle" fill="#c0c8d0" font-size="13">Deep Agents CLI)</text>
  <text x="160" y="225" text-anchor="middle" fill="#c0c8d0" font-size="13">Mastra dev playground</text>
  <text x="160" y="260" text-anchor="middle" fill="#ffd166" font-size="12">no auth · DANGEROUSLY_</text>
  <text x="160" y="278" text-anchor="middle" fill="#ffd166" font-size="12">OMIT_AUTH=true</text>

  <!-- Self-hosted -->
  <rect x="320" y="80" width="240" height="320" rx="10" fill="#2a1e3a" stroke="#c084fc"/>
  <text x="440" y="110" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="700">Self-hosted (Node)</text>
  <text x="440" y="150" text-anchor="middle" fill="#c0c8d0" font-size="13">HTTP-streaming MCP</text>
  <text x="440" y="175" text-anchor="middle" fill="#c0c8d0" font-size="13">Mastra deploy adapters</text>
  <text x="440" y="200" text-anchor="middle" fill="#c0c8d0" font-size="13">(Vercel · Cloudflare)</text>
  <text x="440" y="230" text-anchor="middle" fill="#c0c8d0" font-size="13">Container on Fly · Render</text>
  <text x="440" y="255" text-anchor="middle" fill="#c0c8d0" font-size="13">Sevalla · GKE · ECS</text>
  <text x="440" y="295" text-anchor="middle" fill="#ffd166" font-size="12">add OAuth, RBAC, rate limits</text>

  <!-- Managed -->
  <rect x="600" y="80" width="260" height="320" rx="10" fill="#0f2922" stroke="#5fcf80"/>
  <text x="730" y="110" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="700">Managed runtimes</text>
  <text x="730" y="150" text-anchor="middle" fill="#c0c8d0" font-size="13">Vertex AI Agent Engine</text>
  <text x="730" y="170" text-anchor="middle" fill="#c0c8d0" font-size="11">framework-agnostic</text>
  <text x="730" y="200" text-anchor="middle" fill="#c0c8d0" font-size="13">LangGraph Cloud / Platform</text>
  <text x="730" y="230" text-anchor="middle" fill="#c0c8d0" font-size="13">Anthropic Workbench</text>
  <text x="730" y="260" text-anchor="middle" fill="#c0c8d0" font-size="13">OpenAI Assistants/Responses</text>
  <text x="730" y="295" text-anchor="middle" fill="#ffd166" font-size="12">~$0.11/hr per core+GB</text>

  <text x="450" y="430" text-anchor="middle" fill="#888" font-size="12">Pick by: who owns the runtime, how stateful, who pays for idle.</text>
</svg>
