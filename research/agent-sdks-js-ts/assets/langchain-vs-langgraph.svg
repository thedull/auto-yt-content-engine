<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="-apple-system, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e8e8e8"/>
    </marker>
  </defs>
  <rect width="900" height="460" fill="#0b1220"/>
  <text x="225" y="40" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="700">LangChain — chain (DAG)</text>
  <text x="675" y="40" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="700">LangGraph — graph (cyclic)</text>

  <!-- LangChain side: linear -->
  <rect x="60" y="100" width="120" height="50" rx="6" fill="#1e2a3a" stroke="#4aa3ff"/>
  <text x="120" y="130" text-anchor="middle" fill="#ffffff" font-size="13">retrieve</text>
  <rect x="200" y="100" width="120" height="50" rx="6" fill="#1e2a3a" stroke="#4aa3ff"/>
  <text x="260" y="130" text-anchor="middle" fill="#ffffff" font-size="13">prompt</text>
  <rect x="60" y="200" width="120" height="50" rx="6" fill="#1e2a3a" stroke="#4aa3ff"/>
  <text x="120" y="230" text-anchor="middle" fill="#ffffff" font-size="13">LLM</text>
  <rect x="200" y="200" width="120" height="50" rx="6" fill="#1e2a3a" stroke="#4aa3ff"/>
  <text x="260" y="230" text-anchor="middle" fill="#ffffff" font-size="13">parse</text>
  <rect x="130" y="300" width="120" height="50" rx="6" fill="#1e2a3a" stroke="#4aa3ff"/>
  <text x="190" y="330" text-anchor="middle" fill="#ffffff" font-size="13">answer</text>

  <path d="M 180 125 L 195 125" stroke="#e8e8e8" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 260 150 L 260 195" stroke="#e8e8e8" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 200 225 L 185 225" stroke="#e8e8e8" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 120 250 L 120 280 L 185 280 L 190 295" stroke="#e8e8e8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <text x="225" y="400" text-anchor="middle" fill="#c0c8d0" font-size="13">deterministic, no loop</text>
  <text x="225" y="420" text-anchor="middle" fill="#c0c8d0" font-size="12">retrieve → summarize → answer</text>

  <!-- divider -->
  <line x1="450" y1="80" x2="450" y2="430" stroke="#333" stroke-dasharray="4 4"/>

  <!-- LangGraph side: with loop -->
  <rect x="600" y="100" width="160" height="60" rx="8" fill="#2a1e3a" stroke="#c084fc"/>
  <text x="680" y="125" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">agent (LLM)</text>
  <text x="680" y="145" text-anchor="middle" fill="#c0c8d0" font-size="11">decides next step</text>

  <rect x="600" y="240" width="160" height="60" rx="8" fill="#2a1e3a" stroke="#c084fc"/>
  <text x="680" y="265" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">tools (ToolNode)</text>
  <text x="680" y="285" text-anchor="middle" fill="#c0c8d0" font-size="11">runs requested tool</text>

  <rect x="780" y="160" width="80" height="40" rx="6" fill="#0f2922" stroke="#5fcf80"/>
  <text x="820" y="185" text-anchor="middle" fill="#ffffff" font-size="12">END</text>

  <!-- arrows -->
  <path d="M 680 160 L 680 235" stroke="#e8e8e8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="690" y="200" fill="#ffd166" font-size="11">tool_calls?</text>
  <path d="M 760 130 L 775 175" stroke="#e8e8e8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="790" y="125" fill="#ffd166" font-size="11">no</text>
  <!-- loop back -->
  <path d="M 600 270 Q 540 270 540 180 Q 540 130 595 130" stroke="#ffd166" stroke-width="2" fill="none" marker-end="url(#arrow)" stroke-dasharray="6 4"/>
  <text x="520" y="200" fill="#ffd166" font-size="11">loop</text>

  <text x="675" y="400" text-anchor="middle" fill="#c0c8d0" font-size="13">stateful, cyclic, conditional</text>
  <text x="675" y="420" text-anchor="middle" fill="#c0c8d0" font-size="12">LLM picks the next node</text>
</svg>
