<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="-apple-system, Helvetica, sans-serif">
  <rect width="900" height="520" fill="#0b1220"/>
  <text x="450" y="32" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="700">Agent framework landscape (JS/TS lens)</text>

  <!-- Y axis label -->
  <text x="40" y="240" fill="#c0c8d0" font-size="13" transform="rotate(-90 40 240)">Abstraction level</text>

  <!-- Quadrant labels -->
  <text x="240" y="80" text-anchor="middle" fill="#888" font-size="12">low-level / raw</text>
  <text x="700" y="80" text-anchor="middle" fill="#888" font-size="12">high-level / opinionated</text>

  <!-- Boxes -->
  <rect x="100" y="110" width="200" height="80" rx="8" fill="#1e2a3a" stroke="#4aa3ff"/>
  <text x="200" y="140" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">Raw SDK loop</text>
  <text x="200" y="160" text-anchor="middle" fill="#c0c8d0" font-size="12">@anthropic-ai/sdk</text>
  <text x="200" y="178" text-anchor="middle" fill="#c0c8d0" font-size="12">openai · ai (Vercel)</text>

  <rect x="100" y="220" width="200" height="80" rx="8" fill="#1e2a3a" stroke="#4aa3ff"/>
  <text x="200" y="250" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">LangChain.js</text>
  <text x="200" y="270" text-anchor="middle" fill="#c0c8d0" font-size="12">chains · LCEL</text>
  <text x="200" y="288" text-anchor="middle" fill="#c0c8d0" font-size="12">DAG pipelines</text>

  <rect x="100" y="330" width="200" height="80" rx="8" fill="#1e2a3a" stroke="#4aa3ff"/>
  <text x="200" y="360" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">@langchain/langgraph</text>
  <text x="200" y="380" text-anchor="middle" fill="#c0c8d0" font-size="12">stateful graphs</text>
  <text x="200" y="398" text-anchor="middle" fill="#c0c8d0" font-size="12">cyclic, low-level</text>

  <rect x="600" y="110" width="200" height="80" rx="8" fill="#2a1e3a" stroke="#c084fc"/>
  <text x="700" y="140" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">Mastra</text>
  <text x="700" y="160" text-anchor="middle" fill="#c0c8d0" font-size="12">@mastra/core</text>
  <text x="700" y="178" text-anchor="middle" fill="#c0c8d0" font-size="12">TS-native, batteries-in</text>

  <rect x="600" y="220" width="200" height="80" rx="8" fill="#2a1e3a" stroke="#c084fc"/>
  <text x="700" y="250" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">Claude Agent SDK</text>
  <text x="700" y="270" text-anchor="middle" fill="#c0c8d0" font-size="12">@anthropic-ai/claude-agent-sdk</text>
  <text x="700" y="288" text-anchor="middle" fill="#c0c8d0" font-size="12">embeds Claude Code</text>

  <rect x="600" y="330" width="200" height="80" rx="8" fill="#2a1e3a" stroke="#c084fc"/>
  <text x="700" y="360" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">Google ADK · Deep Agents</text>
  <text x="700" y="380" text-anchor="middle" fill="#c0c8d0" font-size="12">Python-first</text>
  <text x="700" y="398" text-anchor="middle" fill="#c0c8d0" font-size="12">opinionated harnesses</text>

  <!-- Bridge: MCP -->
  <rect x="350" y="220" width="200" height="80" rx="8" fill="#0f2922" stroke="#5fcf80" stroke-width="2"/>
  <text x="450" y="250" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">MCP</text>
  <text x="450" y="270" text-anchor="middle" fill="#c0c8d0" font-size="12">@modelcontextprotocol/sdk</text>
  <text x="450" y="288" text-anchor="middle" fill="#ffd166" font-size="12">cross-cutting wire format</text>

  <text x="450" y="470" text-anchor="middle" fill="#888" font-size="12">All paths converge on: send tools as JSON Schema, validate, loop until done.</text>
</svg>
