<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="-apple-system, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e8e8e8"/>
    </marker>
  </defs>
  <rect width="900" height="480" fill="#0b1220"/>
  <text x="450" y="32" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="700">The agentic loop — universal across SDKs</text>

  <!-- Host / runtime box -->
  <rect x="40" y="80" width="300" height="340" rx="10" fill="#1e2a3a" stroke="#4aa3ff" stroke-width="2"/>
  <text x="190" y="110" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">Host runtime (Node)</text>
  <text x="190" y="140" text-anchor="middle" fill="#c0c8d0" font-size="14">system prompt + tools + history</text>

  <rect x="70" y="170" width="240" height="50" rx="6" fill="#0f2922" stroke="#5fcf80"/>
  <text x="190" y="200" text-anchor="middle" fill="#ffffff" font-size="14">1. send messages + tool schemas</text>

  <rect x="70" y="240" width="240" height="50" rx="6" fill="#0f2922" stroke="#5fcf80"/>
  <text x="190" y="270" text-anchor="middle" fill="#ffffff" font-size="14">3. validate &amp; execute tool</text>

  <rect x="70" y="310" width="240" height="50" rx="6" fill="#0f2922" stroke="#5fcf80"/>
  <text x="190" y="340" text-anchor="middle" fill="#ffffff" font-size="14">4. append result, loop</text>

  <text x="190" y="395" text-anchor="middle" fill="#ffd166" font-size="13">stop when no tool_calls</text>

  <!-- LLM -->
  <rect x="560" y="160" width="280" height="160" rx="10" fill="#2a1e3a" stroke="#c084fc" stroke-width="2"/>
  <text x="700" y="195" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">LLM</text>
  <text x="700" y="225" text-anchor="middle" fill="#c0c8d0" font-size="13">Claude / Gemini / GPT</text>
  <text x="700" y="265" text-anchor="middle" fill="#ffffff" font-size="14">2. emits structured</text>
  <text x="700" y="285" text-anchor="middle" fill="#ffffff" font-size="14">tool_call JSON</text>
  <text x="700" y="305" text-anchor="middle" fill="#ffd166" font-size="12">never executes code</text>

  <!-- Arrows -->
  <path d="M 340 195 L 555 195" stroke="#e8e8e8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 555 285 L 340 285" stroke="#e8e8e8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Loop arrow -->
  <path d="M 190 360 Q 50 380 50 240 Q 50 195 70 195" stroke="#ffd166" stroke-width="2" fill="none" marker-end="url(#arrow)" stroke-dasharray="6 4"/>
  <text x="40" y="290" fill="#ffd166" font-size="12">loop</text>
</svg>
